repos:
  - repo: meta
    hooks:
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v5.0.0"
    hooks:
      - id: check-yaml
      - id: check-ast # check if python files are valid
      - id: check-added-large-files
        args: ["--maxkb=5128"]
      - id: check-merge-conflict # check if merge conflict is included
  - repo: local
    hooks:
      - id: check-elem
        name: check-element
        entry: uv run python ./validate_commit_restrictions.py
        language: system
        require_serial: true
        files: "^src/coala/\\w+_lab/[\\w\\s]+\\.yaml$"
